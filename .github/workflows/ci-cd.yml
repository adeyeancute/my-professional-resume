name: Build and Push to ECR

on:
    push:
        # pull_requests:
        #     branches: [ 'main', 'dev' ]
        branches: [ 'main' ]


permissions:
  id-token: write
  contents: read

jobs:
    build_scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the Code
              uses: actions/checkout@v7
            - name: Trivy Scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                scan-type: 'fs'
                severity: HIGH,CRITICAL
                exit-code: 1
            - name: Build Docker Image
              run: docker build --no-cache -t ${{ secrets.ECR_REPO }}/my-repo:latest .

            - name: Scan Document Image with Trivy
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: ${{ secrets.ECR_REPO }}/my-repo:latest
                format: table
                exit-code: 0 
                ignore-unfixed: true
                severity: CRITICAL,HIGH
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4 # More information on this action can be found below in the 'AWS Credentials' section
              with:
                role-to-assume: ${{ secrets.AWS_ROLE }}
                aws-region: us-east-1
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Push Image to ECR
              run: docker push ${{ secrets.ECR_REPO }}/my-repo:latest

    Deploy_to_ECS:
      needs: build_scan
      runs-on: ubuntu-latest
      steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4 # More information on this action can be found below in the 'AWS Credentials' section
              with:
                role-to-assume: ${{ secrets.AWS_ROLE }}
                aws-region: us-east-1

            - name: Deploy ECS
              uses: aws-actions/amazon-ecs-deploy-task-definition@v2
              with:
                task-definition: task-definition.json
                service: test-task-service
                cluster: test-1
                wait-for-service-stability: true